[[mgr.prepend_keymap]]
on = ["g","r"]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "Go to root(.git level in current project)"

[[mgr.prepend_keymap]]
on = "<C-p>"
run = 'shell -- qlmanage -p "$@"'

[[mgr.prepend_keymap]]
on = "<C-/>"
for = "unix"
run = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

[[mgr.prepend_keymap]]
on = ["c","p"]
run = "plugin command"
desc = "Yazi command prompt"

[[mgr.prepend_keymap]]
on = ":"
run = "plugin custom-shell -- zsh --wait --block=true"
desc = "custom-shell as default, waits for user"

[[mgr.prepend_keymap]]
on = "i"
run = "plugin easyjump"
desc = "easyjump"

[[mgr.prepend_keymap]]
on = ["C"]
run = "plugin ouch"
desc = "Compress with ouch"

[[mgr.prepend_keymap]]
on = "H"
run = "plugin duckdb -1"
desc = "Scroll one column to the left"

[[mgr.prepend_keymap]]
on = "L"
run = "plugin duckdb +1"
desc = "Scroll one column to the right"

[[mgr.prepend_keymap]]
on = ["g","b","o"]
run = "plugin duckdb -open"
desc = "open with duckdb"

[[mgr.prepend_keymap]]
on = ["g","b","u"]
run = "plugin duckdb -ui"
desc = "open with duckdb ui"

[[mgr.prepend_keymap]]
on = "P"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on = "u"
run = "plugin restore"
desc = "Restore last deleted files/folders"

[[mgr.prepend_keymap]]
on = "U"
run = "plugin restore -- --interactive"
desc = "Restore deleted files/folders Interactive"

[[mgr.prepend_keymap]]
on = ["T","o"]
run = "plugin recycle-bin -- open"
desc = "Open Trash (Freedesktop.org)"

[[mgr.prepend_keymap]]
on = ["T","s"]
run = "cd '~/.Trash/'"
desc = "System Trash (MacOS)"

[[mgr.prepend_keymap]]
on = ["T","e","a"]
run = "plugin recycle-bin -- empty"
desc = "Empty Trash all"

[[mgr.prepend_keymap]]
on = ["T","r"]
run = "plugin recycle-bin -- restore"
desc = "Restore from Trash"

[[mgr.prepend_keymap]]
on = ["d","t"]
run = "plugin recycle-bin -- delete"
desc = "Delete from Trash"

[[mgr.prepend_keymap]]
on = ["T","e","d"]
run = "plugin recycle-bin -- emptyDays"
desc = "Empty by days deleted"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = ["g","c"]
run = "plugin git-files"
desc = "Show Git file changes"

[[mgr.prepend_keymap]]
on = "<C-y>"
run = "plugin system-clipboard"
desc = "Copy file as File/photo, etc"

[[mgr.prepend_keymap]]
on = ["d","d"]
run = ['escape --visual', 'shell --confirm "trash-put \"$@\""']
desc = "Mover archivos a la papelera (trash-cli)"

##################################### frank######################
[[mgr.prepend_keymap]]
on = ["f", "r"]
run = "plugin frank 'content rg'"
desc = "Search file by content (rg)"

[[mgr.prepend_keymap]]
on = ["f", "A"]
run = "plugin frank 'content rga'"
desc = "Search file by content (rga)"

[[mgr.prepend_keymap]]
on = ["f", "a"]
run = "plugin frank 'name all'"
desc = "Search by name, files and dirs"

[[mgr.prepend_keymap]]
on = ["f", "c"]
run = "plugin frank 'name cwd'"
desc = "Search by name, files and dirs (CWD)"

[[mgr.prepend_keymap]]
on = ["f", "d"]
run = "plugin frank 'name dir'"
desc = "Search directory by name"

[[mgr.prepend_keymap]]
on = ["f", "f"]
run = "plugin frank 'name file'"
desc = "Search file by name"



