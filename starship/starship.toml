# style = "yellow"
# format = "took [$duration]($style) "

[c]
style = "blue"
symbol = 'Ņś× '

[nodejs]
disabled = false
style = "green"
not_capable_style = "red"
symbol = 'Ņ┤Ź '


[username]
style_root = "#F2CDCD"
style_user = "#F2CDCD"
show_always = false
format = "[$user]($style)"
# format = '[\[]($style)[$user]($style)'
# format = "$user@"

[hostname]
ssh_only = true
# format = '[@]($style)[$hostname]($style)[\]]($style) '
format = '[@]($style)[$hostname]($style): '
# format = "$hostname"
style = "#F2CDCD"
disabled = false

[directory]
truncation_length = 40 ## if you want to see the complete path (default: 3)
truncate_to_repo = false
style = "cyan"

[docker_context]
symbol = "’īł "

[elixir]
symbol = "ŅēĄ "

[elm]
symbol = "Ņś¼ "

[git_branch]
style="blue"
symbol = "ŅéĀ "
# symbol = "’Éś "

[git_status]
ignore_submodules = true
style = "#B4BEFE"
deleted = "Ō£Ś"

[git_commit]
style = "#C6A0F6"
tag_disabled = false

[aws]
format = 'on [$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
style="#F9E2AF"
symbol = "¾░ĖÅ "
force_display = true

[package]
style="yellow"
symbol = '­¤ō” '
disabled = true

