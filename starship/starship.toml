add_newline = false # Add blankline after each prompt
# command_timeout = 1000


# format = '${custom.my_directory}$all'

format = """
$fill
$all"""

[fill] 
symbol = "’æø"
# symbol = "Ōöä"
style = "#003e3e"

# test commit
[line_break]
disabled = false #New line to write command

[character]
success_symbol = "[ŅŹē](green)"
# success_symbol = "[ŅŹē](green)"
# success_symbol = "[’äģ](green)"
error_symbol = "[Ō£Ś](red)"
vicmd_symbol = "[Ņś½](green)"

# [cmd_duration]
